name: Build MacOS ARM

on:
  workflow_dispatch: {}

  release:
    types: [ created ]

  # repository_dispatch:
  #   types: [eccodes-updated, magics-updated]

  push:
    paths:
      - "scripts/common.sh"
      - "scripts/build-macos.sh"
      - "scripts/wheel-macos.sh"
      - "tools/copy-licences.py"
  pull_request:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-macos.sh"
      - "scripts/wheel-macos.sh"
      - "tools/copy-licences.py"

# We don't use the setup-python action here as it installs a universal python
# which creates universal wheels. We want to create wheels for the specific
# architecture we are running on.

jobs:

  build:

    # if: false

    runs-on: [ self-hosted, macOS, ARM64 ]
    # runs-on: [self-hosted, platform-builder-macos13-m2-000]

    name: Build

    steps:

      - run: sudo mkdir -p /Users/runner
      - run: sudo chown administrator:staff /Users/runner

      - uses: actions/checkout@v6

      - run: ./scripts/select-python.sh "3.10"
      - run: ./scripts/build-macos.sh

      ################################################################
      - run: ./scripts/select-python.sh "3.10"
      - run: ./scripts/wheel-macos.sh "3.10"
      - run: ls -l wheelhouse
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        name: Upload wheel 3.10
        with:
          name: wheel-macos-3.10
          path: wheelhouse/*.whl
      - run: rm -fr wheelhouse

      ################################################################
      - run: ./scripts/select-python.sh "3.11"
      - run: ./scripts/wheel-macos.sh "3.11"
      - run: ls -l wheelhouse
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        name: Upload wheel 3.11
        with:
          name: wheel-macos-3.11
          path: wheelhouse/*.whl
      - run: rm -fr wheelhouse

      ################################################################
      - run: ./scripts/select-python.sh "3.12"
      - run: ./scripts/wheel-macos.sh "3.12"
      - run: ls -l wheelhouse
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        name: Upload wheel 3.12
        with:
          name: wheel-macos-3.12
          path: wheelhouse/*.whl
      - run: rm -fr wheelhouse

      ################################################################
      - run: ./scripts/select-python.sh "3.13"
      - run: ./scripts/wheel-macos.sh "3.13"
      - run: ls -l wheelhouse
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        name: Upload wheel 3.13
        with:
          name: wheel-macos-3.13
          path: wheelhouse/*.whl
      - run: rm -fr wheelhouse

      ################################################################
      - run: ./scripts/select-python.sh "3.14"
      - run: ./scripts/wheel-macos.sh "3.14"
      - run: ls -l wheelhouse
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        name: Upload wheel 3.14
        with:
          name: wheel-macos-3.14
          path: wheelhouse/*.whl
      - run: rm -fr wheelhouse

  test:
    if: ${{ github.event_name != 'pull_request' }}
    needs: build

    runs-on: [ self-hosted, macOS, ARM64 ]
    env:
      ECCODES_PYTHON_USE_FINDLIBS: "1"

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    name: Test with Python ${{ matrix.python-version }}

    steps:

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-${{ matrix.python-version }}

      - run: ls -l
      - run: ./scripts/select-python.sh  ${{ matrix.python-version }}
      - run: python3 -m venv .venv
      - run: .venv/bin/pip install --upgrade pip
      - run: ls -l /opt/homebrew/opt/python@${{ matrix.python-version }}/libexec/bin
      - run: which python3
      - run: python3 --version
      - run: pwd
      - run: ls -l
      - run: .venv/bin/pip install *.whl
      - run: .venv/bin/pip install -r tests/requirements.txt

      - name: Configure ecCodes/Magics runtime lookup
        shell: python
        run: |
          import os
          import pathlib
          import ecmwflibs

          eccodes_path = ecmwflibs.find("eccodes")
          magplus_path = ecmwflibs.find("magplus")

          if not eccodes_path:
            raise RuntimeError("Cannot resolve bundled ecCodes path from ecmwflibs")
          if not magplus_path:
            raise RuntimeError("Cannot resolve bundled MagPlus path from ecmwflibs")

          package_dir = str(pathlib.Path(ecmwflibs.__file__).resolve().parent)
          libs_dir = str(pathlib.Path(magplus_path).resolve().parent)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            print(f"ECMWFLIBS_ECCODES={eccodes_path}", file=f)
            print(f"ECMWFLIBS_MAGPLUS={magplus_path}", file=f)
            print(f"MAGPLUS_HOME={package_dir}", file=f)
            print(
              f"DYLD_LIBRARY_PATH={libs_dir}:{os.environ.get('DYLD_LIBRARY_PATH', '')}",
              file=f,
            )

      - run: .venv/bin/pip freeze

      - name: Get some data
        run: |
          curl -L https://get.ecmwf.int/repository/test-data/metview/gallery/2m_temperature.grib  -o data.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.grib -o climetlab.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.nc -o climetlab.nc
          ls -l
        working-directory: tests

      - run: ../.venv/bin/pytest -v -s
        working-directory: tests

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: tests-macos-${{ matrix.python-version }}
          path: tests/*.png

      - run: rm -fr *.whl tests

  deploy:

    if: ${{ github.event_name == 'release' }}

    needs: [ test, build ]

    name: Deploy wheel ${{ matrix.python-version }}

    runs-on: [ self-hosted, macOS, ARM64 ]

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:

      - run: ./scripts/select-python.sh ${{ matrix.python-version }}
      - run: pip3 install twine

      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-${{ matrix.python-version }}

      - run: twine upload *.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
