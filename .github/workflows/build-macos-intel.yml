name: Build MacOS Intel

on:
  workflow_dispatch: {}

  release:
    types: [ created ]

  # repository_dispatch:
  #   types: [eccodes-updated, magics-updated]

  push:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-macos.sh"
      - "scripts/wheel-macos.sh"
      - "tools/copy-licences.py"
  pull_request:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-macos.sh"
      - "scripts/wheel-macos.sh"
      - "tools/copy-licences.py"

jobs:

  build:

    # if: false

    runs-on: macos-15-intel

    name: Build

    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"

    steps:
      - uses: actions/checkout@v6

      - name: Guard runner architecture (must be x86_64)
        run: |
          arch_name="$(uname -m)"
          echo "Runner architecture: ${arch_name}"
          if [[ "${arch_name}" != "x86_64" ]]
          then
            echo "Error: build-macos-intel.yml requires an x86_64 runner"
            exit 1
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - run: ./scripts/build-macos.sh

      ################################################################
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"
      - run: ./scripts/wheel-macos.sh "3.10"
      - uses: actions/upload-artifact@v4
        name: Upload abi3 wheel
        with:
          name: wheel-macos-x86_64-abi3
          path: wheelhouse/*.whl

  test:
    needs: build
    runs-on: macos-15-intel
    env:
      ECCODES_PYTHON_USE_FINDLIBS: "1"
    strategy:
      fail-fast: true
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    name: Test with Python ${{ matrix.python-version }}

    steps:

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: "x64"

      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-x86_64-abi3

      - run: python -m venv .venv

      - run: .venv/bin/pip install --upgrade pip

      - run: .venv/bin/pip install *.whl

      - run: .venv/bin/pip install -r tests/requirements.txt

      - run: .venv/bin/pip freeze

      - name: Get some data
        run: |
          curl -L https://get.ecmwf.int/repository/test-data/metview/gallery/2m_temperature.grib  -o data.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.grib -o climetlab.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.nc -o climetlab.nc
          ls -l
        working-directory: tests

      - run: ../.venv/bin/pytest -v -s
        working-directory: tests

      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: tests-macos-x86_64-py${{ matrix.python-version }}
          path: tests/*.png
          if-no-files-found: ignore

  deploy:

    if: ${{ github.event_name == 'release' }}

    needs: [ test, build ]

    name: Deploy macOS Intel abi3 wheel

    runs-on: ubuntu-latest

    steps:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-x86_64-abi3

      - run: twine upload --repository pypi *.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
