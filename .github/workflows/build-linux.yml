name: Build Linux

on:

  workflow_dispatch:
    inputs:
      wheelmaker-tag:
        description: "Wheelmaker image tag from eccr.ecmwf.int/wheelmaker/2_28_x86_64"
        required: false
        default: "1.latest"

  release:
    types: [ created ]

  # repository_dispatch:
  #   types: [eccodes-updated, magics-updated]

  push:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-linux.sh"
      - "scripts/wheel-linux.sh"
      - "tools/copy-licences.py"
  pull_request:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-linux.sh"
      - "scripts/wheel-linux.sh"
      - "tools/copy-licences.py"

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build abi3 Linux wheel

    steps:
      - uses: actions/checkout@v6

      - name: Login to ECMWF container registry
        run: |
          if [[ -n "${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}" && -n "${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}" ]]
          then
            echo "${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}" | \
              docker login eccr.ecmwf.int \
                --username "${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}" \
                --password-stdin
          else
            echo "ECMWF registry credentials not available, using public fallback image"
          fi

      - name: Select build image
        run: |
          WHEELMAKER_TAG="${{ github.event.inputs.wheelmaker-tag }}"
          if [[ -z "$WHEELMAKER_TAG" ]]
          then
            WHEELMAKER_TAG="1.latest"
          fi

          IMAGE="dockcross/manylinux_2_28-x64:latest"
          if [[ -n "${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}" && -n "${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}" ]]
          then
            IMAGE="eccr.ecmwf.int/wheelmaker/2_28_x86_64:${WHEELMAKER_TAG}"
          fi
          echo "BUILD_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "Using $IMAGE"

      - name: Build binary stack
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$BUILD_IMAGE" \
            bash -lc './scripts/build-linux.sh'

      - name: Build abi3 wheel
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$BUILD_IMAGE" \
            bash -lc './scripts/wheel-linux.sh 3.10'

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-abi3
          path: wheelhouse/*.whl

  test:
    needs: build
    runs-on: ubuntu-latest
    env:
      ECCODES_PYTHON_USE_FINDLIBS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    name: Test with Python ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64-abi3

      - run: pip install *.whl

      - run: pip install -r tests/requirements.txt

      - run: pip freeze

      - run: env | sort

      - name: Get some data
        run: |
          curl -L https://get.ecmwf.int/repository/test-data/metview/gallery/2m_temperature.grib -o data.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.grib -o climetlab.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.nc -o climetlab.nc
          ls -l
        working-directory: tests

      - run: pytest -v -s
        working-directory: tests

      - uses: actions/upload-artifact@v4
        with:
          name: tests-linux-x86_64-py${{ matrix.python-version }}
          path: tests/*.png

  deploy:
    if: ${{ github.event_name == 'release' }}
    needs: [ test, build ]
    name: Deploy Linux abi3 wheel
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64-abi3

      - run: twine upload --repository pypi *.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
