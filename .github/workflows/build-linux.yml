name: Build Linux

on:

  workflow_dispatch: {}

  release:
    types: [ created ]

  # repository_dispatch:
  #   types: [eccodes-updated, magics-updated]

  push:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-linux.sh"
      - "scripts/wheel-linux.sh"
      - "tools/copy-licences.py"
  pull_request:
    branches:
      - master
    paths:
      - "scripts/common.sh"
      - "scripts/build-linux.sh"
      - "scripts/wheel-linux.sh"
      - "tools/copy-licences.py"

jobs:
  build_manylinux2014:

    runs-on: ubuntu-latest

    name: Build manylinux2014

    steps:
      - uses: actions/checkout@v6

      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux2014-x64:latest \
            bash -lc './scripts/build-linux.sh'

      ################################################################
      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux2014-x64:latest \
            bash -lc './scripts/wheel-linux.sh 3.10'
      - uses: actions/upload-artifact@v4
        name: Upload wheel 3.10
        with:
          name: wheel-manylinux2014-3.10
          path: wheelhouse/*.whl

      ################################################################
      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux2014-x64:latest \
            bash -lc './scripts/wheel-linux.sh 3.11'
      - uses: actions/upload-artifact@v4
        name: Upload wheel 3.11
        with:
          name: wheel-manylinux2014-3.11
          path: wheelhouse/*.whl

      ################################################################
      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux2014-x64:latest \
            bash -lc './scripts/wheel-linux.sh 3.12'
      - uses: actions/upload-artifact@v4
        name: Upload wheel 3.12
        with:
          name: wheel-manylinux2014-3.12
          path: wheelhouse/*.whl

      ################################################################
      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux2014-x64:latest \
            bash -lc './scripts/wheel-linux.sh 3.13'
      - uses: actions/upload-artifact@v4
        name: Upload wheel 3.13
        with:
          name: wheel-manylinux2014-3.13
          path: wheelhouse/*.whl

  build_manylinux_2_28:

    runs-on: ubuntu-latest

    name: Build manylinux_2_28

    steps:
      - uses: actions/checkout@v6

      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux_2_28-x64:latest \
            bash -lc './scripts/build-linux.sh'

      ################################################################
      - run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            dockcross/manylinux_2_28-x64:latest \
            bash -lc './scripts/wheel-linux.sh 3.14'
      - uses: actions/upload-artifact@v4
        name: Upload wheel 3.14
        with:
          name: wheel-manylinux_2_28-3.14
          path: wheelhouse/*.whl

  test:

    needs: [ build_manylinux2014, build_manylinux_2_28 ]

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            wheel-tag: manylinux2014
          - python-version: "3.11"
            wheel-tag: manylinux2014
          - python-version: "3.12"
            wheel-tag: manylinux2014
          - python-version: "3.13"
            wheel-tag: manylinux2014
          - python-version: "3.14"
            wheel-tag: manylinux_2_28

    runs-on: ubuntu-latest
    env:
      ECCODES_PYTHON_USE_FINDLIBS: "1"

    name: Test with ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.wheel-tag }}-${{ matrix.python-version }}

      - run: pip install *.whl

      - run: pip install -r tests/requirements.txt

      - run: pip freeze

      - run: env | sort

      - name: Get some data
        run: |
          curl -L https://get.ecmwf.int/repository/test-data/metview/gallery/2m_temperature.grib -o data.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.grib -o climetlab.grib
          curl -L https://github.com/ecmwf/climetlab/raw/main/docs/examples/test.nc -o climetlab.nc
          ls -l
        working-directory: tests

      - run: pytest -v -s
        working-directory: tests

      - uses: actions/upload-artifact@v4
        with:
          name: tests-${{ matrix.wheel-tag }}-${{ matrix.python-version }}
          path: tests/*.png

  deploy:

    if: ${{ github.event_name == 'release' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            wheel-tag: manylinux2014
          - python-version: "3.11"
            wheel-tag: manylinux2014
          - python-version: "3.12"
            wheel-tag: manylinux2014
          - python-version: "3.13"
            wheel-tag: manylinux2014
          - python-version: "3.14"
            wheel-tag: manylinux_2_28
    needs: [ test, build_manylinux2014, build_manylinux_2_28 ]
    name: Deploy wheel ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    steps:

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.wheel-tag }}-${{ matrix.python-version }}

      - run: twine upload *.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
